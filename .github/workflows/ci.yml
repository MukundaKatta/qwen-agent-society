name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      # The society core, tests, and demo are pure standard library: no installs.
      - name: Byte-compile all sources
        run: python -m py_compile $(git ls-files '*.py')
      - name: Run the test suite (stdlib unittest)
        run: python -m unittest discover -s tests -v
      - name: Run the offline demo end-to-end
        run: python examples/offline_demo.py
